version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI:-mongodb+srv://lokesh_db:1234@cluster0.sno8yta.mongodb.net/petcare?retryWrites=true&w=majority&appName=Cluster0}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ACCESS_TOKEN_TTL=${ACCESS_TOKEN_TTL:-15m}
      - REFRESH_TOKEN_TTL=${REFRESH_TOKEN_TTL:-7d}
      - EMAIL_MODE=${EMAIL_MODE:-console}
      - DEV_RETURN_OTP=${DEV_RETURN_OTP:-true}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - petcare-network
    restart: unless-stopped

networks:
  petcare-network:
    driver: bridge
